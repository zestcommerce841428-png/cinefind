name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Type check
        run: npx tsc --noEmit

      - name: Lint
        run: npm run lint

      - name: Build
        run: npm run build
        env:
          # Dummy value so the build step (which loads next.config.ts and
          # collects page data) can complete without real secrets. Real
          # secrets are injected at deploy/runtime, never at build time.
          TMDB_API_READ_ACCESS_TOKEN: "ci-placeholder-token-not-used-at-build-time"
          NEXT_PUBLIC_SITE_URL: "https://example.com"
